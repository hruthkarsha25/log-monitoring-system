spring.application.name=LogMonitoringSystem

app.service.name=log-monitoring-service

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=log-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.project.logmonitoringsystem.model.LogEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

spring.data.redis.host=redis
spring.data.redis.port=6379

logstash.host=logstash
logstash.port=5000

logging.level.org.springframework=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN

logging.level.org.apache.kafka=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN

elasticsearch.host=elasticsearch
elasticsearch.port=9200

